<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thingino Roku Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #1a1a2e; --sidebar-bg: #162447; --text-color: #e0e0e0;
            --header-color: #1f4068; --accent-color: #e43f5a; --border-color: #333;
            --button-bg: #0f3460; --timeline-bg: #1f4068; --timeline-handle: #e43f5a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            display: flex; height: 100vh; overflow: hidden; user-select: none;
        }
        .view-mode { display: none; width: 100%; height: 100%; }
        .view-mode.active { display: flex; }
        
        /* Sidebar */
        #sidebar {
            width: 250px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 10;
        }
        #header { padding: 20px; background-color: var(--header-color); text-align: center; }
        #header h1 { margin: 0; font-size: 1.5em; color: var(--accent-color); }
        #camera-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; }
        #camera-list li {
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #ffffff15;
            display: flex; flex-direction: column;
        }
        #camera-list li:hover, #camera-list li.active { background-color: #ffffff20; }
        .cam-name { font-weight: bold; font-size: 1.1em; }
        .cam-desc { font-size: 0.8em; color: #aaa; margin-top: 5px; }
        
        /* Main Content */
        #main-content { flex-grow: 1; display: flex; justify-content: center; align-items: center; background-color: #000; position: relative; }
        #video-player, #img-viewer { max-width: 100%; max-height: 100%; display: none; object-fit: contain; }
        #loading-msg { position: absolute; font-size: 1.5em; color: #888; }
        
        /* Controls */
        #controls { padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .btn {
            background-color: var(--button-bg); color: white; border: none; padding: 10px;
            border-radius: 5px; cursor: pointer; font-size: 1em; text-align: center;
        }
        .btn:hover { background-color: #1a5b9e; }
        .tabs { display: flex; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; background: #222; border: 1px solid #555; color: white; cursor: pointer; }
        .tab-btn.active { background: var(--button-bg); }

        /* Timelapse View */
        #timelapse-mode { flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto;}
        .tl-section { background: var(--sidebar-bg); padding: 15px; border-radius: 8px; }
        .tl-section h2 { margin-top: 0; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; }
        #tl-cam-list label { display: block; margin-bottom: 5px; cursor: pointer; }
        .tl-cam-info { font-size: 0.8em; color: #aaa; margin-left: 20px; }
        
        #tl-timeline-container { height: 60px; display: flex; align-items: center; }
        #tl-timeline { position: relative; width: 100%; height: 10px; background: var(--timeline-bg); border-radius: 5px; }
        #tl-timeline-selection { position: absolute; height: 100%; background: var(--accent-color); opacity: 0.7; }
        .tl-handle { position: absolute; width: 20px; height: 20px; background: var(--timeline-handle); border-radius: 50%; top: -5px; cursor: ew-resize; }
        #tl-time-labels { display: flex; justify-content: space-between; font-size: 0.8em; color: #aaa; margin-top: 5px; }
        
        .tl-controls { display: flex; gap: 20px; align-items: center; }
        .tl-controls label { font-weight: bold; }
        #tl-fps { width: 60px; }
        
        #tl-output-video { max-width: 100%; border: 1px solid var(--border-color); }
        #tl-video-container a { color: var(--accent-color); }

    </style>
</head>
<body>

    <div id="sidebar">
        <div id="header"><h1>Thingino Viewer</h1></div>
        <div id="view-container">
            <div id="live-mode" class="view-mode active">
                <ul id="camera-list"></ul>
            </div>
            <div id="timelapse-mode" class="view-mode">
                <div class="tl-section">
                    <h2>1. Select Cameras</h2>
                    <div id="tl-cam-list">Loading...</div>
                </div>
                <div class="tl-section">
                    <h2>2. Select Time Window</h2>
                    <div id="tl-timeline-container">
                        <div id="tl-timeline">
                            <div id="tl-timeline-selection"></div>
                            <div class="tl-handle" id="tl-handle-start"></div>
                            <div class="tl-handle" id="tl-handle-end"></div>
                        </div>
                    </div>
                    <div id="tl-time-labels">
                        <span id="tl-label-start"></span>
                        <span id="tl-label-end"></span>
                    </div>
                </div>
                <div class="tl-section">
                    <h2>3. Generate Video</h2>
                    <div class="tl-controls">
                        <label for="tl-fps">FPS:</label>
                        <input type="number" id="tl-fps" value="24" min="1" max="60">
                        <button class="btn" id="btn-generate-tl">Generate Video</button>
                    </div>
                </div>
                <div class="tl-section" id="tl-output-section" style="display:none;">
                    <h2>Output</h2>
                    <div id="tl-output-status"></div>
                    <div id="tl-video-container" style="display:none;">
                        <video id="tl-output-video" controls></video>
                        <br><a id="tl-download-link" href="#" download>Download Video</a>
                    </div>
                </div>
                 <div class="tl-section">
                    <h2>Previous Videos</h2>
                    <ul id="tl-previous-videos"></ul>
                </div>
            </div>
        </div>
        <div id="controls">
            <div class="tabs">
                <button class="tab-btn active" id="tab-live">Live</button>
                <button class="tab-btn" id="tab-timelapse">Time-lapse</button>
            </div>
            <button class="btn" id="btn-screensaver">Start Screensaver</button>
            <button class="btn" id="btn-settings">Settings</button>
        </div>
    </div>
    <div id="main-content">
        <div id="loading-msg">Loading cameras...</div>
        <video id="video-player" controls autoplay muted playsinline></video>
        <img id="img-viewer" src="" alt="Camera Stream">
    </div>

    <script>
        // State
        const state = { cameras: {}, camNames: [], activeCam: null, hls: null, imgInterval: null };

        // DOM Elements
        const els = {
            camList: document.getElementById('camera-list'),
            loading: document.getElementById('loading-msg'),
            video: document.getElementById('video-player'),
            img: document.getElementById('img-viewer'),
            sidebar: document.getElementById('sidebar'),
            mainContent: document.getElementById('main-content'),
            liveView: document.getElementById('live-mode'),
            timelapseView: document.getElementById('timelapse-mode'),
            tl: {
                camList: document.getElementById('tl-cam-list'),
                timeline: document.getElementById('tl-timeline'),
                selection: document.getElementById('tl-timeline-selection'),
                handleStart: document.getElementById('tl-handle-start'),
                handleEnd: document.getElementById('tl-handle-end'),
                labelStart: document.getElementById('tl-label-start'),
                labelEnd: document.getElementById('tl-label-end'),
                fps: document.getElementById('tl-fps'),
                generateBtn: document.getElementById('btn-generate-tl'),
                outputSection: document.getElementById('tl-output-section'),
                outputStatus: document.getElementById('tl-output-status'),
                videoContainer: document.getElementById('tl-video-container'),
                outputVideo: document.getElementById('tl-output-video'),
                downloadLink: document.getElementById('tl-download-link'),
                previousVideos: document.getElementById('tl-previous-videos'),
            }
        };

        // --- Init ---
        async function init() {
            try {
                const res = await fetch('/camera/all_info');
                if (!res.ok) throw new Error(res.status);
                const camInfo = await res.json();
                camInfo.forEach(c => state.cameras[c.name] = c);
                state.camNames = Object.keys(state.cameras);
                
                renderSidebar();
                els.loading.style.display = 'none';
                if (state.camNames.length > 0) {
                    selectCamera(state.camNames[0], state.cameras[state.camNames[0]].snapshot ? 'jpg' : 'hls');
                }
            } catch (err) {
                els.loading.textContent = 'Auth Required or Server Error';
            }
        }

        // --- View Switching ---
        document.getElementById('tab-live').onclick = () => switchView('live');
        document.getElementById('tab-timelapse').onclick = () => switchView('timelapse');

        function switchView(view) {
            if (view === 'live') {
                document.getElementById('tab-live').classList.add('active');
                document.getElementById('tab-timelapse').classList.remove('active');
                els.liveView.classList.add('active');
                els.timelapseView.classList.remove('active');
                els.mainContent.style.display = 'flex';
                els.sidebar.style.width = '250px';

            } else {
                document.getElementById('tab-timelapse').classList.add('active');
                document.getElementById('tab-live').classList.remove('active');
                els.timelapseView.classList.add('active');
                els.liveView.classList.remove('active');
                els.mainContent.style.display = 'none';
                els.sidebar.style.width = '100%';
                loadTimelapseSummary();
            }
        }

        // --- Live View ---
        function renderSidebar() {
            els.camList.innerHTML = '';
            state.camNames.forEach(name => {
                const cam = state.cameras[name];
                if (cam.snapshot) {
                    const li = document.createElement('li');
                    li.dataset.name = name; li.dataset.mode = 'jpg';
                    li.innerHTML = `<div class="cam-name">${name}</div><div class="cam-desc">(jpg)</div>`;
                    li.onclick = () => selectCamera(name, 'jpg');
                    els.camList.appendChild(li);
                }
                if (cam.stream) {
                    const li = document.createElement('li');
                    li.dataset.name = name; li.dataset.mode = 'hls';
                    li.innerHTML = `<div class="cam-name">${name}</div><div class="cam-desc">(hls)</div>`;
                    li.onclick = () => selectCamera(name, 'hls');
                    els.camList.appendChild(li);
                }
            });
        }

        function selectCamera(name, mode) {
            cleanupPlayer();
            state.activeCam = name;
            const cam = state.cameras[name];
            document.querySelectorAll('#camera-list li').forEach(li => {
                li.classList.toggle('active', li.dataset.name === name && li.dataset.mode === mode);
            });
            
            if (mode === 'hls' && cam.stream) {
                els.video.style.display = 'block';
                if (Hls.isSupported()) {
                    state.hls = new Hls();
                    state.hls.loadSource(cam.stream);
                    state.hls.attachMedia(els.video);
                }
            } else {
                els.img.style.display = 'block';
                const updateImg = () => { els.img.src = `/camera/${name}?t=${Date.now()}`; };
                updateImg();
                state.imgInterval = setInterval(updateImg, 1000);
            }
        }

        function cleanupPlayer() {
            els.video.style.display = 'none'; els.video.pause();
            els.img.style.display = 'none';
            if (state.hls) { state.hls.destroy(); state.hls = null; }
            if (state.imgInterval) { clearInterval(state.imgInterval); state.imgInterval = null; }
        }

        // --- Time-lapse View ---
        let tlState = { summary: [], minTs: 0, maxTs: 0 };

        async function loadTimelapseSummary() {
            try {
                const res = await fetch('/timelapse/summary');
                tlState.summary = await res.json();
                renderTimelapseView();
                loadPreviousVideos();
            } catch (e) {
                els.tl.camList.textContent = 'Could not load time-lapse data.';
            }
        }
        
        async function loadPreviousVideos() {
            try {
                const res = await fetch('/timelapse/videos');
                const videos = await res.json();
                els.tl.previousVideos.innerHTML = videos.map(v => `<li><a href="/timelapse/videos/${v}" target="_blank">${v}</a></li>`).join('');
            } catch(e) { console.error("Could not load previous videos", e)}
        }

        function renderTimelapseView() {
            if (tlState.summary.length === 0) {
                els.tl.camList.innerHTML = 'No snapshots have been captured yet.';
                return;
            }

            els.tl.camList.innerHTML = tlState.summary.map(cam => `
                <label>
                    <input type="checkbox" class="tl-cam-checkbox" value="${cam.camera_name}">
                    <strong>${cam.camera_name}</strong>
                    <div class="tl-cam-info">${cam.frame_count} frames from ${cam.first_snapshot_timestamp} to ${cam.last_snapshot_timestamp}</div>
                </label>
            `).join('');

            const allTimestamps = tlState.summary.flatMap(c => [
                new Date(c.first_snapshot_timestamp).getTime(),
                new Date(c.last_snapshot_timestamp).getTime()
            ]);
            tlState.minTs = Math.min(...allTimestamps);
            tlState.maxTs = Math.max(...allTimestamps);
            
            setupTimeline();
        }

        function setupTimeline() {
            const startHandle = els.tl.handleStart;
            const endHandle = els.tl.handleEnd;
            const selection = els.tl.selection;
            
            let activeHandle = null;

            function updateUI() {
                const startPos = parseFloat(startHandle.style.left || '0');
                const endPos = parseFloat(endHandle.style.left || '100');
                selection.style.left = `${startPos}%`;
                selection.style.width = `${endPos - startPos}%`;
                
                const startTime = new Date(tlState.minTs + (tlState.maxTs - tlState.minTs) * (startPos / 100));
                const endTime = new Date(tlState.minTs + (tlState.maxTs - tlState.minTs) * (endPos / 100));

                els.tl.labelStart.textContent = startTime.toLocaleString();
                els.tl.labelEnd.textContent = endTime.toLocaleString();
            }

            function onMouseMove(e) {
                if (!activeHandle) return;
                const rect = els.tl.timeline.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let percent = (x / rect.width) * 100;
                percent = Math.max(0, Math.min(100, percent));
                
                if (activeHandle === startHandle) {
                    const endPos = parseFloat(endHandle.style.left || '100');
                    if (percent >= endPos) percent = endPos;
                } else {
                    const startPos = parseFloat(startHandle.style.left || '0');
                    if (percent <= startPos) percent = startPos;
                }
                
                activeHandle.style.left = `${percent}%`;
                updateUI();
            }

            function onMouseUp() { activeHandle = null; }

            startHandle.onmousedown = () => activeHandle = startHandle;
            endHandle.onmousedown = () => activeHandle = endHandle;
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);

            startHandle.style.left = '0%';
            endHandle.style.left = '100%';
            updateUI();
        }

        els.tl.generateBtn.onclick = async () => {
            const selectedCams = Array.from(document.querySelectorAll('.tl-cam-checkbox:checked')).map(cb => cb.value);
            if (selectedCams.length === 0) {
                alert('Please select at least one camera.');
                return;
            }

            const startPos = parseFloat(els.tl.handleStart.style.left || '0');
            const endPos = parseFloat(els.tl.handleEnd.style.left || '100');
            const startTime = new Date(tlState.minTs + (tlState.maxTs - tlState.minTs) * (startPos / 100));
            const endTime = new Date(tlState.minTs + (tlState.maxTs - tlState.minTs) * (endPos / 100));
            
            const payload = {
                cameras: selectedCams,
                start_time: startTime.toISOString().slice(0, 19).replace('T', ' '),
                end_time: endTime.toISOString().slice(0, 19).replace('T', ' '),
                fps: parseInt(els.tl.fps.value, 10) || 24
            };

            els.tl.outputSection.style.display = 'block';
            els.tl.videoContainer.style.display = 'none';
            els.tl.outputStatus.textContent = 'Generating video... this may take a while.';
            
            try {
                const res = await fetch('/timelapse/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    throw new Error(`Server error: ${res.status}`);
                }
                const result = await res.json();
                
                els.tl.outputStatus.textContent = 'Video generated!';
                els.tl.videoContainer.style.display = 'block';
                els.tl.outputVideo.src = result.video_url;
                els.tl.downloadLink.href = result.video_url;
                loadPreviousVideos();

            } catch(e) {
                els.tl.outputStatus.textContent = `Error: ${e.message}. See server logs for details.`;
            }
        };

        init();
    </script>
</body>
</html>
