<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thingino Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #121212; --sidebar-bg: #1e1e1e; --text-color: #e0e0e0;
            --header-color: #2a2a2a; --accent-color: #bb86fc; --border-color: #333;
            --button-bg: #333; --button-hover: #444; --timeline-bg: #424242; --timeline-handle: #bb86fc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            display: flex; height: 100vh; overflow: hidden; user-select: none;
        }
        
        /* Layout */
        #sidebar {
            width: 280px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 10;
        }
        #main-container { flex-grow: 1; display: flex; flex-direction: column; }
        
        /* Sidebar */
        #header { padding: 20px; background-color: var(--header-color); text-align: center; }
        #header h1 { margin: 0; font-size: 1.5em; color: var(--accent-color); }
        #camera-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; }
        #camera-list li {
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; transition: background-color 0.2s;
        }
        #camera-list li:hover { background-color: #ffffff1a; }
        #camera-list li.active { background-color: #bb86fc33; }
        .cam-name { font-weight: bold; font-size: 1.1em; }
        .cam-desc { font-size: 0.8em; color: #aaa; margin-top: 5px; }

        /* Main Content */
        #main-header { display: flex; padding: 10px; background: var(--header-color); border-bottom: 1px solid var(--border-color); }
        .tab-btn { padding: 10px 20px; background: var(--button-bg); border: 1px solid var(--border-color); color: white; cursor: pointer; }
        .tab-btn.active { background: var(--accent-color); color: #000; font-weight: bold; }
        
        .tab-content { flex-grow: 1; display: none; overflow-y: auto; }
        .tab-content.active { display: block; }

        /* Live View Tab */
        #live-view-content { height: 100%; display: flex; justify-content: center; align-items: center; background: #000; }
        #video-player, #img-viewer { max-width: 100%; max-height: 100%; display: none; object-fit: contain; }
        #loading-msg { font-size: 1.5em; color: #888; }
        
        /* Timelapse Tab */
        #timelapse-view-content { padding: 20px; }
        .tl-section { background: var(--sidebar-bg); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .tl-section h2 { margin-top: 0; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; }

        #tl-timeline-container { position: relative; height: 120px; }
        #tl-timeline { position: relative; width: 100%; height: 10px; background: var(--timeline-bg); border-radius: 5px; top: 50px; }
        .tl-handle { position: absolute; width: 20px; height: 20px; background: var(--timeline-handle); border-radius: 50%; top: 45px; cursor: ew-resize; }
        .tl-preview { position: absolute; bottom: 30px; width: 160px; height: 90px; background: #000; border: 2px solid var(--timeline-handle); display: none; }
        #tl-preview-start { transform: translateX(-50%); }
        #tl-preview-end { transform: translateX(-50%); }
        #tl-time-labels { display: flex; justify-content: space-between; font-size: 0.9em; color: #aaa; margin-top: 50px; }

        #tl-video-list li {
            background: #2a2a2a; padding: 10px; border-radius: 4px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .video-meta span { margin-right: 15px; font-size: 0.9em; color: #ccc; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="header"><h1>Thingino Viewer</h1></div>
        <ul id="camera-list"></ul>
    </div>

    <div id="main-container">
        <div id="main-header">
            <button class="tab-btn active" data-tab="live">Live View</button>
            <button class="tab-btn" data-tab="timelapse">Time-lapse</button>
        </div>
        
        <div id="live-view-content" class="tab-content active">
            <div id="loading-msg">Select a camera to begin</div>
            <video id="video-player" controls autoplay muted playsinline></video>
            <img id="img-viewer" alt="Camera Stream">
        </div>

        <div id="timelapse-view-content" class="tab-content">
            <div id="tl-cam-select-msg">Select a camera from the sidebar to see its time-lapse options.</div>
            <div id="tl-cam-content" style="display:none;">
                <div class="tl-section">
                    <h2 id="tl-header">Time-lapse for...</h2>
                    <div id="tl-timeline-container">
                        <div id="tl-timeline">
                            <div class="tl-handle" id="tl-handle-start"></div>
                            <div class="tl-handle" id="tl-handle-end"></div>
                            <img id="tl-preview-start" class="tl-preview">
                            <img id="tl-preview-end" class="tl-preview">
                        </div>
                        <div id="tl-time-labels">
                            <span id="tl-label-start"></span>
                            <span id="tl-label-end"></span>
                        </div>
                    </div>
                     <div class="tl-controls">
                        <label for="tl-fps">FPS:</label>
                        <input type="number" id="tl-fps" value="24" min="1" max="60">
                        <button class="btn" id="btn-generate-tl">Generate Video</button>
                    </div>
                </div>

                <div class="tl-section">
                    <h2>Generated Videos</h2>
                    <video id="tl-video-player" style="width:100%; display:none; margin-bottom:20px;" controls></video>
                    <ul id="tl-video-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = { cameras: {}, activeCam: null, hls: null, imgInterval: null };
        const els = { /* DOM elements loaded in init */ };

        async function init() {
            // Cache all DOM elements
            const allIds = [...document.querySelectorAll('[id]')].forEach(el => els[el.id] = el);

            try {
                const res = await fetch('/camera/all_info');
                const camInfo = await res.json();
                camInfo.forEach(c => state.cameras[c.name] = c);
                renderSidebar();
            } catch (err) {
                els.loadingMsg.textContent = 'Error connecting to server.';
            }

            els.mainHeader.addEventListener('click', e => {
                if (e.target.matches('.tab-btn')) {
                    switchTab(e.target.dataset.tab);
                }
            });
        }

        function renderSidebar() {
            els.cameraList.innerHTML = Object.values(state.cameras).map(cam => `
                <li data-name="${cam.name}">
                    <div class="cam-name">${cam.name}</div>
                    <div class="cam-desc">
                        ${cam.snapshot ? 'Snapshot' : ''} ${cam.snapshot && cam.stream ? ' | ' : ''} ${cam.stream ? 'Stream' : ''}
                    </div>
                </li>
            `).join('');
            
            els.cameraList.addEventListener('click', e => {
                const li = e.target.closest('li');
                if (li) selectCamera(li.dataset.name);
            });
        }
        
        function selectCamera(name) {
            if (!name || state.activeCam === name) return;
            state.activeCam = name;
            document.querySelectorAll('#camera-list li').forEach(li => li.classList.toggle('active', li.dataset.name === name));
            
            // Refresh content of the currently active tab
            const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
            switchTab(activeTab, true);
        }

        function switchTab(tabId, forceRefresh = false) {
            if (!state.activeCam && tabId !== 'live') {
                alert("Please select a camera first.");
                return;
            }

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.toggle('active', content.id === `${tabId}-view-content`));
            
            cleanupPlayer();
            if (tabId === 'live') {
                loadLiveView();
            } else {
                loadTimelapseView();
            }
        }
        
        function loadLiveView() {
            if (!state.activeCam) {
                els.loadingMsg.textContent = "Select a camera to begin";
                return;
            }
            els.loadingMsg.style.display = 'none';
            const cam = state.cameras[state.activeCam];
            
            if (cam.stream) { // Prioritize stream for live view
                els.videoPlayer.style.display = 'block';
                if (Hls.isSupported()) {
                    state.hls = new Hls();
                    state.hls.loadSource(cam.stream);
                    state.hls.attachMedia(els.videoPlayer);
                }
            } else if (cam.snapshot) {
                els.imgViewer.style.display = 'block';
                const updateImg = () => { els.imgViewer.src = `/camera/${state.activeCam}?t=${Date.now()}`; };
                updateImg();
                state.imgInterval = setInterval(updateImg, 1000);
            }
        }
        
        function cleanupPlayer() {
            els.videoPlayer.style.display = 'none'; els.videoPlayer.pause();
            els.imgViewer.style.display = 'none';
            if (state.hls) { state.hls.destroy(); state.hls = null; }
            if (state.imgInterval) { clearInterval(state.imgInterval); state.imgInterval = null; }
        }
        
        // --- Timelapse View ---
        async function loadTimelapseView() {
            els.tlCamSelectMsg.style.display = 'none';
            els.tlCamContent.style.display = 'block';
            els.tlHeader.textContent = `Time-lapse for ${state.activeCam}`;
            els.tlVideoList.innerHTML = '<li>Loading videos...</li>';
            
            const [videosRes, summaryRes] = await Promise.all([
                fetch(`/timelapse/videos?camera=${state.activeCam}`), // Assuming future filtering
                fetch(`/timelapse/summary`) // Get summary for all to find range
            ]);

            const videos = await videosRes.json();
            const summary = await summaryRes.json();

            renderVideoList(videos);
            setupTimeline(summary);
        }

        function renderVideoList(videos) {
            if (videos.length === 0) {
                els.tlVideoList.innerHTML = '<li>No videos generated for this camera yet.</li>';
                return;
            }
            els.tlVideoList.innerHTML = videos.map(v => {
                const [start, end] = v.filename.replace('-timelapse.mp4', '').split('-to-');
                const niceName = `From ${new Date(start.replace('_', ' ')).toLocaleString()} to ${new Date(end.replace('_', ' ')).toLocaleString()}`;
                const wallClockDuration = new Date(end.replace('_', ' ')) - new Date(start.replace('_', ' '));
                const wallClockFormatted = new Date(wallClockDuration).toISOString().substr(11, 8);
                const runtimeFormatted = new Date(v.duration_seconds * 1000).toISOString().substr(11, 8);

                return `<li>
                    <div>
                        <strong>${niceName}</strong>
                        <div class="video-meta">
                            <span>Duration: ${runtimeFormatted}</span>
                            <span>Span: ${wallClockFormatted}</span>
                            <span>Size: ${v.size_mb} MB</span>
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-play" data-url="/timelapse/videos/${v.filename}">Play</button>
                        <a href="/timelapse/videos/${v.filename}" class="btn" download>Download</a>
                    </div>
                </li>`;
            }).join('');
        }
        
        document.getElementById('tl-video-list').addEventListener('click', e => {
            if (e.target.matches('.btn-play')) {
                els.tlVideoPlayer.src = e.target.dataset.url;
                els.tlVideoPlayer.style.display = 'block';
                els.tlVideoPlayer.play();
            }
        });
        
        // Timeline setup and other functions will go here...
        // This is a simplified placeholder for the timeline logic
        function setupTimeline(summary) {
             const camSummary = summary.find(c => c.camera_name === state.activeCam);
             if(!camSummary) {
                 els.tlLabelStart.textContent = "No frames captured";
                 els.tlLabelEnd.textContent = "";
                 return;
             }
             // Basic timeline label setup
             els.tlLabelStart.textContent = new Date(camSummary.first_snapshot_timestamp).toLocaleString();
             els.tlLabelEnd.textContent = new Date(camSummary.last_snapshot_timestamp).toLocaleString();
        }

        init();
    </script>
</body>
</html>
