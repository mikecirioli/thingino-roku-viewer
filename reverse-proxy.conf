# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cirioli.duckdns.org;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cirioli.duckdns.org;

    # SSL Configuration
    ssl_certificate /config/fullchain.pem;
    ssl_certificate_key /config/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Auth subrequest ───
    # Photoframe server checks session cookie + private IP (LAN bypass).
    # Returns 200 (allow) or 401 (deny).
    location = /auth/verify {
        internal;
        proxy_pass http://192.168.1.245:8099/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }

    # On auth failure, redirect browsers to login page
    error_page 401 = @login_redirect;
    location @login_redirect {
        return 302 /login;
    }

    # ─── Public paths (no auth_request) ───

    location /login {
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/login {
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Protected paths (auth_request gated) ───

    # go2rtc — now behind auth
    location /api/ws {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.207:1984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/stream.m3u8 {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.207:1984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/streams {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.207:1984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/webrtc {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.207:1984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Photoframe server endpoints
    location /camera/list {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /camera/all_info {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Photoframe JS posts to /camera/library/* but the server route is /library/*.
    # Rewrite at the proxy edge so the upload form works without changing the app.
    location ^~ /camera/library/ {
        auth_request /auth/verify;
        rewrite ^/camera/library/(.*) /library/$1 break;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    location ~ ^/camera/ {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /timelapse/ {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ha/ {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /random {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /web {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /library {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /install {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Photoframe management endpoints (orientation review, dupe resolution,
    # geotag inspection). All POST/GET handlers on the photoframe at :8099.
    location /orientation/ {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    location /duplicates/ {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /photos/ {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Roku photoframe screensaver. The photoframe app enforces its own auth
    # via ?auth=<shared_secret> (see _is_request_authorized in server.py).
    # Strip the /photoframe prefix; let the app handle auth.
    location /photoframe/ {
        rewrite ^/photoframe/(.*) /$1 break;
        proxy_pass http://192.168.1.245:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Trump's Toadies Service
    location /toadies/ {
        proxy_pass http://192.168.1.245:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── DJ Steve Voice API (unauthenticated — for Tasker/Android) ───
    location /steve/api/voice {
        proxy_pass http://192.168.1.245:3020/steve/api/voice;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── DJ Steve Web UI (no auth — Spotify OAuth is the gate) ───
    location /steve/ {
        proxy_pass http://192.168.1.245:3020/steve/;
        auth_request /auth/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── DJ Steve Spotify OAuth ───
    location /steve-auth/ {
        proxy_pass http://192.168.1.245:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gate the securitah dashboard behind auth. Other /local/ paths fall
    # through to the catch-all (HA itself enforces its own auth on most
    # endpoints; webcam/photoframe upload paths must remain unaffected).
    location /local/securitah/ {
        auth_request /auth/verify;
        proxy_pass http://192.168.1.245:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Home Assistant (root path — catches /api/websocket etc.)
    # HA has its own auth, and this is the catch-all, so no auth_request here.
    location / {
        proxy_pass http://192.168.1.245:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
