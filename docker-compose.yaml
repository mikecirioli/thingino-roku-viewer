services:
  thingino-roku-viewer:
    build: .
    container_name: thingino-roku-viewer-server
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - /path/to/your/photos:/media:ro
      - ./timelapse_data:/data/timelapse
    environment:
      - REFRESH=30
      - TITLE=
