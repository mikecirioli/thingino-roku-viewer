services:
  3-bad-dogs:
    build: .
    container_name: 3-bad-dogs-server
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - /path/to/your/photos:/media:ro
      - ./cameras.yaml:/config/cameras.yaml:ro
    environment:
      - REFRESH=30
      - TITLE=
      - FRIGATE_URL=           # optional: e.g. http://192.168.1.207:5000
      - GO2RTC_URL=            # optional: e.g. http://192.168.1.207:1984
      - CAMERA_IDLE=30
      - HA_URL=                # optional: e.g. http://192.168.1.245:8123
      - HA_TOKEN=              # optional: HA long-lived access token
      # Legacy camera config (used if cameras.yaml not present):
      # - CAMERAS={"cam1":{"ip":"10.0.0.5","user":"admin","pass":"secret"}}
